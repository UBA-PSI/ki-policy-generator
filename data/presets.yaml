# oder als Objekt { id, text } (= preset-spezifischer Text) angegeben werden.
# upload_item / no_upload_item folgen demselben Schema.

version: "2.2"

presets:
  # ============================================================
  # AI-None: Kein KI-Einsatz
  # ============================================================
  - id: "ai-none"
    name: "AI-None v1"
    description: "Kein KI-Einsatz. Prüfung in kontrolliertem Setting."
    color: "oklch(58.63% 0.231 19.6)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge sind in dieser Lehrveranstaltung **nicht erlaubt** – weder zum Lernen noch bei Abgaben."
      - "Die Prüfung findet unter Aufsicht ohne KI-Zugang statt."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-None v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. In dieser Veranstaltung ist der Einsatz von KI-Werkzeugen grundsätzlich nicht gestattet. Die Prüfungsleistung wird in einem kontrollierten Setting ohne KI-Unterstützung erbracht.
    items:
      - id: "grundsatz-erlaubt"
        text: |
          Der Einsatz von KI-Werkzeugen (wie ChatGPT, Copilot, Claude, Gemini etc.) ist in dieser Lehrveranstaltung **nicht gestattet**. Dies umfasst sowohl die Nutzung bei bewerteten Abgaben als auch die Nutzung als Lernhilfe, soweit nicht ausdrücklich anders angegeben.
      - id: "verboten-regel"
        text: |
          In dieser Lehrveranstaltung ist der Einsatz von KI-Werkzeugen **grundsätzlich nicht gestattet**. Dies umfasst insbesondere:

          - Die Verwendung von KI-Werkzeugen zur Erstellung, Überarbeitung oder Verbesserung von Texten, Präsentationen oder anderen Abgaben.
          - Die Nutzung von KI-Werkzeugen während beaufsichtigter Prüfungen (Klausuren etc.) – dies wird als Täuschungsversuch gewertet.
          - Das Hochladen von urheberrechtlich geschützten Kursmaterialien oder personenbezogenen Daten in KI-Systeme.
      - "datenschutz-regel-generic"
      - id: "pruefung-massnahmen"
        text: |
          Da KI-Werkzeuge in dieser Lehrveranstaltung nicht gestattet sind, wird die Prüfungsleistung ausschließlich in einem kontrollierten Setting ohne KI-Unterstützung erbracht:

          Als „Arbeiten ohne Aufsicht" gelten alle bewerteten Leistungen, die außerhalb einer kontrollierten Prüfungsumgebung erstellt werden – zum Beispiel Hausaufgaben, Übungsblätter, Seminar- und Hausarbeiten, Projektabgaben (Code, Reports), Abschlussarbeiten sowie die Vorbereitung von Materialien für Referate und Präsentationen (Folien, Handouts, Sprechernotizen). Die Durchführung eines Referats oder einer Präsentation selbst gilt als Leistung unter Aufsicht.

          - Die Prüfungsleistung erfolgt als **beaufsichtigte schriftliche Prüfung** (Klausur) ohne Zugang zu KI-Werkzeugen oder dem Internet.
          - Zulässige Hilfsmittel werden zu Beginn der Prüfung bekanntgegeben.
      - "lehrende-keine-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
      - "unterstuetzung-angebot-generic"
    upload_item: &upload_item_erlaubnis
      id: "urheberrecht-erlaubnis-generic"
      text: |
        Die meisten in diesem Kurs bereitgestellten Lehrmaterialien sind urheberrechtlich geschützt. Für folgende, explizit freigegebene Materialien ist die Verarbeitung durch KI-Dienste unter Auflagen erlaubt:

        - Materialien, die im Lernmanagementsystem mit dem Vermerk **„KI-Nutzung erlaubt"** gekennzeichnet sind.

        Dieses Nutzungsrecht gilt nur für gängige KI-Dienste (ChatGPT, Claude, Copilot, Gemini) und nur zum Zweck der persönlichen Zusammenfassung und Verständniskontrolle. Das Hochladen zu anderen Diensten oder zu anderen Zwecken ist nicht gestattet.

        Alle anderen Materialien dürfen **nicht** zu KI-Diensten hochgeladen werden.
    no_upload_item: "urheberrecht-verbot-generic"

  # ============================================================
  # AI-Learn: KI zum Lernen frei
  # ============================================================
  - id: "ai-learn"
    name: "AI-Learn v1"
    description: "KI zum Lernen frei. Prüfungsleistung ohne KI."
    color: "oklch(74.61% 0.171 51.56)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge dürfen frei zum Lernen eingesetzt werden (z.B. Prüfungsvorbereitung, Erklärungen)."
      - "KI darf **nicht** bei bewerteten Arbeiten eingesetzt werden, die ohne Aufsicht erstellt werden (z.B. Hausaufgaben, Seminararbeiten, Projektabgaben)."
      - "Der Kompetenznachweis erfolgt durch eine Prüfung unter Aufsicht (z.B. Klausur, mündliche Prüfung) ohne KI."
      - "Keine Kennzeichnung der KI-Nutzung erforderlich."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-Learn v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. Der Einsatz von KI ist zum Lernen grundsätzlich erlaubt. Die Prüfungsleistung wird ohne KI-Unterstützung erbracht. Eine Kennzeichnung der KI-Nutzung ist nicht erforderlich.
    items:
      - "grundsatz-erlaubt-generic"
      - "kompetenzen-standard"
      - "erlaubt-ohne-kennzeichnung-regel"
      - id: "verboten-regel"
        text: |
          Folgende Nutzungsarten von KI sind in dieser Lehrveranstaltung ausdrücklich **nicht** erlaubt:

          - Nutzung von KI-Werkzeugen bei der Erstellung bewerteter Abgaben und Prüfungsleistungen – die Prüfungsleistung muss vollständig eigenständig erbracht werden.
          - Nutzung von KI während beaufsichtigter Prüfungen (Klausuren etc.), sofern nicht ausdrücklich durch die Prüfungsordnung oder die Lehrperson gestattet – dies kann als Täuschungsversuch gewertet werden.
          - Verwendung von KI zur Umgehung von Lernzielen, die explizit eigenständiges kritisches Denken, kreatives Problemlösen, Analysefähigkeiten oder spezifische methodische Kompetenzen erfordern.
          - Hochladen von urheberrechtlich geschützten Kursmaterialien oder personenbezogenen Daten in Cloud-basierte KI-Systeme ohne explizite Erlaubnis (siehe Abschnitt 3).
      - "datenschutz-regel-generic"
      - id: "pruefung-massnahmen"
        text: |
          KI-Werkzeuge sind im Semester frei zum Lernen nutzbar. Die Prüfungsleistung wird jedoch ohne KI-Unterstützung erbracht, um Ihre individuellen Kompetenzen valide bewerten zu können:

          Als „Arbeiten ohne Aufsicht" gelten alle bewerteten Leistungen, die außerhalb einer kontrollierten Prüfungsumgebung erstellt werden – zum Beispiel Hausaufgaben, Übungsblätter, Seminar- und Hausarbeiten, Projektabgaben (Code, Reports), Abschlussarbeiten sowie die Vorbereitung von Materialien für Referate und Präsentationen (Folien, Handouts, Sprechernotizen). Die Durchführung eines Referats oder einer Präsentation selbst gilt als Leistung unter Aufsicht.

          - Falls der Kurs bewertete Arbeiten ohne Aufsicht umfasst (z.B. Hausaufgaben, Übungsblätter, Seminararbeiten), dürfen KI-Werkzeuge bei diesen Arbeiten **nicht** eingesetzt werden. Die Arbeiten müssen eigenständig erstellt werden.
          - Die Prüfungsleistung erfolgt als **beaufsichtigte Prüfung** (Klausur oder mündliche Prüfung), bei der KI-Werkzeuge und Internet nicht zugelassen sind.
          - Die Prüfung fokussiert auf Verständnis und Transfer, nicht auf reine Wissensreproduktion.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
      - "unterstuetzung-angebot-generic"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot-generic"

