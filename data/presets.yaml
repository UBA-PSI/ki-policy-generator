  # ============================================================
  # AI-Skill: KI-Kompetenz als Lernziel
  # ============================================================
  - id: "ai-skill"
    name: "AI-Skill"
    description: "KI-Kompetenz ist Lernziel. Prozess und Ergebnis werden bewertet."
    color: "oklch(75.23% 0.209 144.64)"
    upload_default: false
    tldr:
      - "KI-Kompetenz ist explizites Lernziel dieser Lehrveranstaltung."
      - "KI-Werkzeuge dürfen und sollen aktiv eingesetzt werden."
      - "Prozess und Ergebnis der KI-Nutzung werden bewertet."
      - "Keine personenbezogenen Daten in KI-Dienste eingeben."
      - "KI-Ergebnisse kritisch prüfen – KI macht Fehler."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-Skill"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. KI-Kompetenz ist ein explizites Lernziel. KI-Werkzeuge sollen aktiv und reflektiert eingesetzt werden. Sowohl der Prozess als auch das Ergebnis der KI-Nutzung fließen in die Bewertung ein.
    items:
      - "grundsatz-erlaubt"
      - id: "kompetenzen-erweitert"
        text: |
          Zusätzlich zu den grundlegenden KI-Kompetenzen sollen Sie in dieser Lehrveranstaltung lernen:

          - Die spezifischen Stärken und Schwächen verschiedener KI-Modelle und Betriebsarten (z.B. lokale Modelle versus kommerziell angebotene Modelle) für unterschiedliche Aufgaben einzuschätzen.
          - Strategien zur Überprüfung und Validierung von KI-generierten Informationen mithilfe wissenschaftlicher Methoden anzuwenden.
          - Die ethischen Implikationen des KI-Einsatzes im Fachgebiet zu diskutieren.
          - KI-Werkzeuge zur Unterstützung wissenschaftlicher Arbeitsprozesse (Recherche, Analyse, Texterstellung) gezielt und reflektiert einzusetzen.
      - "erlaubt-ohne-kennzeichnung-regel"
      - "erlaubt-mit-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel"
      - "kennzeichnung-detailliert"
      - id: "pruefung-massnahmen"
        text: |
          KI-Kompetenz ist ein explizites Lernziel dieser Lehrveranstaltung. Sowohl der Prozess als auch das Ergebnis der KI-Nutzung werden bewertet:

          - Das **Prompt-Protokoll mit Reflexion** ist Pflichtbestandteil jeder Abgabe und wird benotet.
          - Die **Qualität des KI-Einsatzes** – Promptqualität, kritische Überprüfung der Ergebnisse, eigenständige Weiterverarbeitung – fließt in die Bewertung ein.
          - Ein abschließendes **Portfolio** dokumentiert den KI-Einsatz über das Semester und ist Teil der Prüfungsleistung.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"
