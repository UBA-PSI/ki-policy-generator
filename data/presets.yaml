# KI-Policy-Generator - Preset-Vorlagen
# Version: 2.1
# Sprache: de
#
# Items können entweder als einfacher String (= Default-Text aus policy-data.yaml)
# oder als Objekt { id, text } (= preset-spezifischer Text) angegeben werden.
# upload_item / no_upload_item folgen demselben Schema.

version: "2.0"

presets:
  # ============================================================
  # AI-None: Kein KI-Einsatz
  # ============================================================
  - id: "ai-none"
    name: "AI-None v1"
    description: "Kein KI-Einsatz. Prüfung in kontrolliertem Setting."
    color: "oklch(58.63% 0.231 19.6)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge sind in dieser Lehrveranstaltung **nicht erlaubt** – weder als Lernhilfe noch bei Abgaben."
      - "Die Prüfung findet in einem kontrollierten Setting ohne KI-Zugang statt."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-None v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. In dieser Veranstaltung ist der Einsatz von KI-Werkzeugen grundsätzlich nicht gestattet. Die Prüfungsleistung wird in einem kontrollierten Setting ohne KI-Unterstützung erbracht.
    items:
      - id: "grundsatz-erlaubt"
        text: |
          Der Einsatz von KI-Werkzeugen (wie ChatGPT, Copilot, Claude, Gemini, HAWKI etc.) ist in dieser Lehrveranstaltung **nicht gestattet**. Dies umfasst sowohl die Nutzung bei bewerteten Abgaben als auch die Nutzung als Lernhilfe, soweit nicht ausdrücklich anders angegeben.
      - id: "verboten-regel"
        text: |
          In dieser Lehrveranstaltung ist der Einsatz von KI-Werkzeugen **grundsätzlich nicht gestattet**. Dies umfasst insbesondere:

          - Die Verwendung von KI-Werkzeugen zur Erstellung, Überarbeitung oder Verbesserung von Texten, Präsentationen oder anderen Abgaben.
          - Die Nutzung von KI-Werkzeugen während beaufsichtigter Prüfungen (Klausuren etc.) – dies wird als Täuschungsversuch gewertet.
          - Das Hochladen von urheberrechtlich geschützten Kursmaterialien oder personenbezogenen Daten in KI-Systeme.
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          Da KI-Werkzeuge in dieser Lehrveranstaltung nicht gestattet sind, wird die Prüfungsleistung ausschließlich in einem kontrollierten Setting ohne KI-Unterstützung erbracht:

          - Die Prüfungsleistung erfolgt als **beaufsichtigte schriftliche Prüfung** (Klausur) ohne Zugang zu KI-Werkzeugen oder dem Internet.
          - Zulässige Hilfsmittel werden zu Beginn der Prüfung bekanntgegeben.
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: &upload_item_erlaubnis
      id: "urheberrecht-erlaubnis"
      text: |
        Die meisten in diesem Kurs bereitgestellten Lehrmaterialien sind urheberrechtlich geschützt. Für folgende, explizit freigegebene Materialien ist die Verarbeitung durch KI-Dienste unter Auflagen erlaubt:

        - Materialien, die im Lernmanagementsystem mit dem Vermerk **„KI-Nutzung erlaubt"** gekennzeichnet sind.

        Dieses Nutzungsrecht gilt nur für den universitätseigenen Dienst **HAWKI** sowie für gängige KI-Dienste (ChatGPT, Claude, Copilot, Gemini) und nur zum Zweck der persönlichen Zusammenfassung und Verständniskontrolle. Das Hochladen zu anderen Diensten oder zu anderen Zwecken ist nicht gestattet.

        Alle anderen Materialien dürfen **nicht** zu KI-Diensten hochgeladen werden.
    no_upload_item: "urheberrecht-verbot"

  # ============================================================
  # AI-Learn: KI zum Lernen frei
  # ============================================================
  - id: "ai-learn"
    name: "AI-Learn v1"
    description: "KI zum Lernen frei. Prüfungsleistung ohne KI."
    color: "oklch(74.61% 0.171 51.56)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge dürfen frei zum Lernen eingesetzt werden (z.B. Prüfungsvorbereitung, Erklärungen)."
      - "Die Prüfungsleistung wird ohne KI-Unterstützung erbracht (z.B. Klausur)."
      - "Keine Kennzeichnung der KI-Nutzung erforderlich."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-Learn v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. Der Einsatz von KI ist zum Lernen grundsätzlich erlaubt. Die Prüfungsleistung wird ohne KI-Unterstützung erbracht. Eine Kennzeichnung der KI-Nutzung ist nicht erforderlich.
    items:
      - "grundsatz-erlaubt"
      - "erlaubt-ohne-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          KI-Werkzeuge sind im Semester frei zum Lernen nutzbar. Die Prüfungsleistung wird jedoch ohne KI-Unterstützung erbracht, um Ihre individuellen Kompetenzen valide bewerten zu können:

          - Die Prüfungsleistung erfolgt als **beaufsichtigte schriftliche Prüfung** (Klausur), bei der KI-Werkzeuge und Internet nicht zugelassen sind.
          - Die Prüfung fokussiert auf Verständnis und Transfer, nicht auf reine Wissensreproduktion.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"

  # ============================================================
  # AI-DocShort: Einfache Kennzeichnung
  # ============================================================
  - id: "ai-docshort"
    name: "AI-DocShort v1"
    description: "KI bei Abgaben erlaubt. Einfache Kennzeichnung (Tool + Zweck)."
    color: "oklch(82.39% 0.133 91.5)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge dürfen auch bei Abgaben als Hilfsmittel eingesetzt werden."
      - "Einfache Kennzeichnung am Ende der Arbeit: genutztes Tool und Einsatzzweck angeben."
      - "Die Kernleistung (Analyse, Argumentation, Schlussfolgerungen) muss eigenständig erbracht werden."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-DocShort v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. KI-Werkzeuge dürfen als Hilfsmittel eingesetzt werden, auch bei bewerteten Abgaben. Die Nutzung ist mit einer einfachen Kennzeichnung (Tool + Zweck) zu dokumentieren.
    items:
      - "grundsatz-erlaubt"
      - "erlaubt-ohne-kennzeichnung-regel"
      - "erlaubt-mit-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel"
      - "kennzeichnung-einfach"
      - id: "pruefung-massnahmen"
        text: |
          Wir sind uns bewusst, dass die Nutzung von KI bei unbeaufsichtigten Prüfungsleistungen (z.B. Hausarbeiten) kaum kontrollierbar ist und dies Chancengleichheit und Fairness gefährden kann. Um dennoch eine valide Bewertung Ihrer individuellen Kompetenzen sicherzustellen, werden in diesem Kurs folgende Maßnahmen angewendet:

          - Schriftliche Abgaben werden durch ein **kurzes mündliches Kolloquium** ergänzt, in dem das Verständnis und die Eigenständigkeit überprüft werden.
          - Die Aufgabenstellungen zielen verstärkt auf **Transfer und kritische Analyse** ab, nicht auf reine Wissensreproduktion.
          - Die Einhaltung der **Kennzeichnungspflicht** (Tool + Zweck) wird bei der Bewertung berücksichtigt.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"

