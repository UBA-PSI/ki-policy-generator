      - id: "pruefung-massnahmen"
        text: |
          KI-Werkzeuge dürfen bei der Erstellung von Abgaben ohne Einschränkung eingesetzt werden. Der individuelle Kompetenznachweis erfolgt durch eine Verteidigung:

          - Eingereichte Arbeiten werden in einem **mündlichen Prüfungsgespräch verteidigt**. Dabei wird überprüft, ob Inhalt und Argumentation eigenständig vertreten werden können.
          - Die **mündliche Verteidigung** fließt maßgeblich in die Gesamtbewertung ein.
          - Wer die eingereichte Arbeit nicht überzeugend vertreten kann, muss mit einer deutlich schlechteren Bewertung rechnen.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
