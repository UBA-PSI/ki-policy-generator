    items:
      - "grundsatz-erlaubt-generic"
      - "kompetenzen-standard"
      - "erlaubt-ohne-kennzeichnung-regel"
      - "erlaubt-mit-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel-generic"
      - "kennzeichnung-einfach-generic"
      - "zugang-chancengleichheit-generic"
      - id: "pruefung-massnahmen"
        text: |
          Wir sind uns bewusst, dass die Nutzung von KI bei unbeaufsichtigten Prüfungsleistungen (z.B. Hausarbeiten) kaum kontrollierbar ist und dies Chancengleichheit und Fairness gefährden kann. Um dennoch eine valide Bewertung Ihrer individuellen Kompetenzen sicherzustellen, werden in diesem Kurs folgende Maßnahmen angewendet:

          Als „Arbeiten ohne Aufsicht" gelten alle bewerteten Leistungen, die außerhalb einer kontrollierten Prüfungsumgebung erstellt werden – zum Beispiel Hausaufgaben, Übungsblätter, Seminar- und Hausarbeiten, Projektabgaben (Code, Reports), Abschlussarbeiten sowie die Vorbereitung von Materialien für Referate und Präsentationen (Folien, Handouts, Sprechernotizen). Die Durchführung eines Referats oder einer Präsentation selbst gilt als Leistung unter Aufsicht.

          - Schriftliche Abgaben werden durch ein **kurzes mündliches Kolloquium** ergänzt, in dem das Verständnis und die Eigenständigkeit überprüft werden.
          - Die Aufgabenstellungen zielen verstärkt auf **Transfer und kritische Analyse** ab, nicht auf reine Wissensreproduktion.
          - Die Einhaltung der **Kennzeichnungspflicht** (Tool + Zweck) wird bei der Bewertung berücksichtigt.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
      - "unterstuetzung-angebot-generic"
