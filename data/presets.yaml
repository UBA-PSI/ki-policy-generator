    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. KI-Werkzeuge dürfen ohne Einschränkung eingesetzt werden. Der Kompetenznachweis erfolgt durch eine mündliche oder schriftliche Verteidigung der eingereichten Arbeit.
    items:
      - "grundsatz-erlaubt"
      - "erlaubt-ohne-kennzeichnung-regel"
