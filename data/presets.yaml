  # ============================================================
  # AI-Defend: Kompetenznachweis durch Verteidigung
  # ============================================================
  - id: "ai-defend"
    name: "AI-Defend v1"
    description: "KI ohne Einschränkung. Kompetenznachweis durch Verteidigung."
    color: "oklch(49.39% 0.215 298.31)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge dürfen uneingeschränkt eingesetzt werden – auch bei Abgaben."
      - "Kompetenznachweis durch mündliche oder schriftliche Verteidigung der eingereichten Arbeit."
      - "Keine Kennzeichnung der KI-Nutzung erforderlich."
      - "Wer die Arbeit nicht überzeugend vertreten kann, muss mit schlechterer Bewertung rechnen."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-Defend v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. KI-Werkzeuge dürfen ohne Einschränkung eingesetzt werden. Der Kompetenznachweis erfolgt durch eine mündliche oder schriftliche Verteidigung der eingereichten Arbeit.
    items:
      - id: "grundsatz-erlaubt"
        text: |
          Der Einsatz von KI-Werkzeugen (wie ChatGPT, Copilot, Claude, Gemini, HAWKI etc.) ist in dieser Lehrveranstaltung **ohne Einschränkung** erlaubt – sowohl zum Lernen als auch bei der Erstellung von Abgaben. Eine Kennzeichnung der KI-Nutzung ist nicht erforderlich. Der Kompetenznachweis erfolgt durch eine Verteidigung der eingereichten Arbeit.
      - "erlaubt-ohne-kennzeichnung-regel"
      - id: "verboten-regel"
        text: |
          Folgende Nutzungsarten von KI sind in dieser Lehrveranstaltung ausdrücklich **nicht** erlaubt:

          - Nutzung von KI während beaufsichtigter Prüfungen (Klausuren etc.), sofern nicht ausdrücklich gestattet – dies kann als Täuschungsversuch gewertet werden.
          - Verwendung von KI zur Umgehung von Lernzielen, die explizit eigenständiges kritisches Denken oder spezifische methodische Kompetenzen erfordern.
          - Hochladen von urheberrechtlich geschützten Kursmaterialien oder personenbezogenen Daten in Cloud-basierte KI-Systeme ohne explizite Erlaubnis.
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          KI-Werkzeuge dürfen bei der Erstellung von Abgaben ohne Einschränkung eingesetzt werden. Der individuelle Kompetenznachweis erfolgt durch eine Verteidigung:

          - Eingereichte Arbeiten werden in einem **mündlichen Prüfungsgespräch verteidigt**. Dabei wird überprüft, ob Inhalt und Argumentation eigenständig vertreten werden können.
          - Die **mündliche Verteidigung** fließt maßgeblich in die Gesamtbewertung ein.
          - Wer die eingereichte Arbeit nicht überzeugend vertreten kann, muss mit einer deutlich schlechteren Bewertung rechnen.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"

  # ============================================================
  # AI-Skill: KI-Kompetenz als Lernziel
  # ============================================================
  - id: "ai-skill"
    name: "AI-Skill v1"
    description: "KI-Kompetenz ist Lernziel. Prozess und Ergebnis werden bewertet."
    color: "oklch(75.23% 0.209 144.64)"
    upload_default: false
    tldr:
      - "KI-Kompetenz ist explizites Lernziel – KI-Werkzeuge sollen aktiv und reflektiert eingesetzt werden."
      - "Prompt-Protokoll mit Reflexion ist Pflichtbestandteil und wird benotet."
      - "Die Qualität des KI-Einsatzes fließt in die Bewertung ein."
      - "Ein Portfolio dokumentiert den KI-Einsatz über das Semester."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-Skill v1"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. KI-Kompetenz ist ein explizites Lernziel. KI-Werkzeuge sollen aktiv und reflektiert eingesetzt werden. Sowohl der Prozess als auch das Ergebnis der KI-Nutzung fließen in die Bewertung ein.
    items:
      - id: "grundsatz-erlaubt"
        text: |
          Der Einsatz von KI-Werkzeugen (wie ChatGPT, Copilot, Claude, Gemini, HAWKI etc.) ist in dieser Lehrveranstaltung nicht nur erlaubt, sondern ein **explizites Lernziel**. Sie sollen KI-Werkzeuge aktiv, gezielt und reflektiert einsetzen lernen. Es gelten die spezifischen Regelungen dieser Policy bezüglich Dokumentation und akademischer Integrität.
      - id: "kompetenzen-erweitert"
        text: |
          Zusätzlich zu den grundlegenden KI-Kompetenzen sollen Sie in dieser Lehrveranstaltung lernen:

          - Die spezifischen Stärken und Schwächen verschiedener KI-Modelle und Betriebsarten (z.B. lokale Modelle versus kommerziell angebotene Modelle) für unterschiedliche Aufgaben einzuschätzen.
          - Strategien zur Überprüfung und Validierung von KI-generierten Informationen mithilfe wissenschaftlicher Methoden anzuwenden.
          - Die ethischen Implikationen des KI-Einsatzes im Fachgebiet zu diskutieren.
          - KI-Werkzeuge zur Unterstützung wissenschaftlicher Arbeitsprozesse (Recherche, Analyse, Texterstellung) gezielt und reflektiert einzusetzen.
      - "erlaubt-ohne-kennzeichnung-regel"
      - "erlaubt-mit-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel"
      - "kennzeichnung-detailliert"
      - id: "pruefung-massnahmen"
        text: |
          KI-Kompetenz ist ein explizites Lernziel dieser Lehrveranstaltung. Sowohl der Prozess als auch das Ergebnis der KI-Nutzung werden bewertet:

          - Das **Prompt-Protokoll mit Reflexion** ist Pflichtbestandteil jeder Abgabe und wird benotet.
          - Die **Qualität des KI-Einsatzes** – Promptqualität, kritische Überprüfung der Ergebnisse, eigenständige Weiterverarbeitung – fließt in die Bewertung ein.
          - Ein abschließendes **Portfolio** dokumentiert den KI-Einsatz über das Semester und ist Teil der Prüfungsleistung.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"
