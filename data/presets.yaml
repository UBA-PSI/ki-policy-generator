  # ============================================================
  - id: "ai-docshort"
    name: "AI-DocShort"
    description: "KI bei Abgaben erlaubt. Einfache Kennzeichnung (Tool + Zweck)."
    color: "oklch(82.39% 0.133 91.5)"
