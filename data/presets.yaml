    tldr:
      - "KI-Werkzeuge dürfen bei Abgaben als Hilfsmittel eingesetzt werden."
      - "Einfache Kennzeichnung erforderlich: genutztes Tool und Einsatzzweck angeben."
      - "Die Kernleistung (Analyse, Argumentation) muss eigenständig erbracht werden."
      - "Keine personenbezogenen Daten in KI-Dienste eingeben."
      - "KI-Ergebnisse kritisch prüfen – KI macht Fehler."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-DocShort"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. KI-Werkzeuge dürfen als Hilfsmittel eingesetzt werden, auch bei bewerteten Abgaben. Die Nutzung ist mit einer einfachen Kennzeichnung (Tool + Zweck) zu dokumentieren.
    items:
      - "grundsatz-erlaubt"
      - "erlaubt-ohne-kennzeichnung-regel"
      - "erlaubt-mit-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel"
      - "kennzeichnung-einfach"
      - id: "pruefung-massnahmen"
        text: |
          Wir sind uns bewusst, dass die Nutzung von KI bei unbeaufsichtigten Prüfungsleistungen (z.B. Hausarbeiten) kaum kontrollierbar ist und dies Chancengleichheit und Fairness gefährden kann. Um dennoch eine valide Bewertung Ihrer individuellen Kompetenzen sicherzustellen, werden in diesem Kurs folgende Maßnahmen angewendet:

          - Schriftliche Abgaben werden durch ein **kurzes mündliches Kolloquium** ergänzt, in dem das Verständnis und die Eigenständigkeit überprüft werden.
          - Die Aufgabenstellungen zielen verstärkt auf **Transfer und kritische Analyse** ab, nicht auf reine Wissensreproduktion.
          - Die Einhaltung der **Kennzeichnungspflicht** (Tool + Zweck) wird bei der Bewertung berücksichtigt.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"

