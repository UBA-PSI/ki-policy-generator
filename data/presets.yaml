# KI-Policy-Generator - Preset-Vorlagen
# Version: 2.0
# Sprache: de
#
# Items können entweder als einfacher String (= Default-Text aus policy-data.yaml)
# oder als Objekt { id, text } (= preset-spezifischer Text) angegeben werden.
# upload_item / no_upload_item folgen demselben Schema.

version: "2.0"

presets:
  # ============================================================
  # AI-None: Kein KI-Einsatz
  # ============================================================
  - id: "ai-none"
    name: "AI-None"
    description: "Kein KI-Einsatz. Prüfung in kontrolliertem Setting."
    color: "oklch(58.63% 0.231 19.6)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge dürfen in dieser Lehrveranstaltung **nicht** eingesetzt werden."
      - "Die Prüfungsleistung wird ohne KI-Unterstützung in einem kontrollierten Setting erbracht."
      - "Keine personenbezogenen Daten in KI-Dienste eingeben."
      - "KI-Ergebnisse kritisch prüfen – KI macht Fehler."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-None"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. In dieser Veranstaltung ist der Einsatz von KI-Werkzeugen grundsätzlich nicht gestattet. Die Prüfungsleistung wird in einem kontrollierten Setting ohne KI-Unterstützung erbracht.
    items:
      - "verboten-regel"
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          Da KI-Werkzeuge in dieser Lehrveranstaltung nicht gestattet sind, wird die Prüfungsleistung ausschließlich in einem kontrollierten Setting ohne KI-Unterstützung erbracht:

          - Die Prüfungsleistung erfolgt als **beaufsichtigte schriftliche Prüfung** (Klausur) ohne Zugang zu KI-Werkzeugen oder dem Internet.
          - Zulässige Hilfsmittel werden zu Beginn der Prüfung bekanntgegeben.
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: &upload_item_erlaubnis
      id: "urheberrecht-erlaubnis"
      text: |
        Die meisten in diesem Kurs bereitgestellten Lehrmaterialien sind urheberrechtlich geschützt. Für folgende, explizit freigegebene Materialien ist die Verarbeitung durch KI-Dienste unter Auflagen erlaubt:

        - Materialien, die im Lernmanagementsystem mit dem Vermerk **„KI-Nutzung erlaubt"** gekennzeichnet sind.

        Dieses Nutzungsrecht gilt nur für den universitätseigenen Dienst **HAWKI** sowie für gängige KI-Dienste (ChatGPT, Claude, Copilot, Gemini) und nur zum Zweck der persönlichen Zusammenfassung und Verständniskontrolle. Das Hochladen zu anderen Diensten oder zu anderen Zwecken ist nicht gestattet.

        Alle anderen Materialien dürfen **nicht** zu KI-Diensten hochgeladen werden.
    no_upload_item: "urheberrecht-verbot"

  # ============================================================
  # AI-Learn: KI zum Lernen frei
  # ============================================================
  - id: "ai-learn"
    name: "AI-Learn"
    description: "KI zum Lernen frei. Prüfungsleistung ohne KI."
    color: "oklch(74.61% 0.171 51.56)"
    upload_default: false
    tldr:
      - "KI-Werkzeuge dürfen im Semester frei zum Lernen eingesetzt werden."
      - "Die Prüfungsleistung wird ohne KI-Unterstützung erbracht."
      - "Keine Kennzeichnung der KI-Nutzung erforderlich."
      - "Keine personenbezogenen Daten in KI-Dienste eingeben."
      - "KI-Ergebnisse kritisch prüfen – KI macht Fehler."
    tldr_upload: "Kursmaterialien dürfen in KI-Tools hochgeladen werden."
    tldr_no_upload: "Kursmaterialien dürfen **nicht** in KI-Tools hochgeladen werden."
    document_title: "KI-Richtlinie: AI-Learn"
    document_intro: |
      Dieses Dokument legt die Richtlinien für die Nutzung von KI-Werkzeugen in dieser Lehrveranstaltung fest. Der Einsatz von KI ist zum Lernen grundsätzlich erlaubt. Die Prüfungsleistung wird ohne KI-Unterstützung erbracht. Eine Kennzeichnung der KI-Nutzung ist nicht erforderlich.
    items:
      - "grundsatz-erlaubt"
      - "erlaubt-ohne-kennzeichnung-regel"
      - "verboten-regel"
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          KI-Werkzeuge sind im Semester frei zum Lernen nutzbar. Die Prüfungsleistung wird jedoch ohne KI-Unterstützung erbracht, um Ihre individuellen Kompetenzen valide bewerten zu können:

          - Die Prüfungsleistung erfolgt als **beaufsichtigte schriftliche Prüfung** (Klausur), bei der KI-Werkzeuge und Internet nicht zugelassen sind.
          - Die Prüfung fokussiert auf Verständnis und Transfer, nicht auf reine Wissensreproduktion.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
    upload_item: *upload_item_erlaubnis
    no_upload_item: "urheberrecht-verbot"

  # ============================================================
