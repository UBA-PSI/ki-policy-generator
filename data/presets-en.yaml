      This document establishes the guidelines for the use of AI tools in this course. AI tools may be used without restrictions. Competence is demonstrated through an oral or written defense of the submitted work.
    items:
      - id: "grundsatz-erlaubt"
        text: |
          The use of AI tools (such as ChatGPT, Copilot, Claude, Gemini, HAWKI, etc.) is permitted **without restrictions** in this course – both for learning and for creating submissions. Labeling of AI use is not required. Competence is demonstrated through a defense of the submitted work.
