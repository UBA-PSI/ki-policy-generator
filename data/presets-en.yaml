# AI Policy Generator - Preset Templates
# Version: 2.2
# Language: en
#
# Items can be specified as a simple string (= default text from policy-data-en.yaml)
# or as an object { id, text } (= preset-specific text).
# upload_item / no_upload_item follow the same schema.

version: "2.2"

presets:
  # ============================================================
  # AI-None: No AI Use
  # ============================================================
  - id: "ai-none"
    name: "AI-None v1"
    description: "No AI use. Examination in controlled setting."
    color: "oklch(58.63% 0.231 19.6)"
    upload_default: false
    tldr:
      - "AI tools are **not permitted** in this course – neither as a learning aid nor for submissions."
      - "The examination takes place in a controlled setting without AI access."
    tldr_upload: "Course materials may be uploaded to AI tools."
    tldr_no_upload: "Course materials may **not** be uploaded to AI tools."
    document_title: "AI Policy: AI-None v1"
    document_intro: |
      This document establishes the guidelines for the use of AI tools in this course. In this course, the use of AI tools is generally not permitted. The examination is conducted in a controlled setting without AI support.
    items:
      - id: "grundsatz-erlaubt"
        text: |
          The use of AI tools (such as ChatGPT, Copilot, Claude, Gemini, HAWKI, etc.) is **not permitted** in this course. This includes both the use for graded submissions and the use as a learning aid, unless explicitly stated otherwise.
      - id: "verboten-regel"
        text: |
          In this course, the use of AI tools is **generally not permitted**. This includes in particular:

          - The use of AI tools to create, revise, or improve texts, presentations, or other submissions.
          - The use of AI tools during supervised examinations (written exams, etc.) – this will be treated as an attempt at deception.
          - Uploading copyrighted course materials or personal data to AI systems.
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          Since AI tools are not permitted in this course, the examination is conducted exclusively in a controlled setting without AI support:

          - The examination takes the form of a **supervised written exam** without access to AI tools or the internet.
          - Permitted aids will be announced at the beginning of the exam.
      - "lehrende-keine-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
      - "unterstuetzung-angebot"
    upload_item: &upload_item_permission
      id: "urheberrecht-erlaubnis"
      text: |
        Most course materials provided in this course are copyrighted. For the following, explicitly released materials, processing by AI services is permitted under conditions:

        - Materials marked with the note **"AI use permitted"** in the learning management system.

        This usage right applies only to the university's own **HAWKI** service as well as common AI services (ChatGPT, Claude, Copilot, Gemini) and only for the purpose of personal summarization and comprehension checks. Uploading to other services or for other purposes is not permitted.

        All other materials may **not** be uploaded to AI services.
    no_upload_item: "urheberrecht-verbot"

  # ============================================================
  # AI-Learn: AI free for learning
  # ============================================================
  - id: "ai-learn"
    name: "AI-Learn v1"
    description: "AI free for learning. Examination without AI."
    color: "oklch(74.61% 0.171 51.56)"
    upload_default: false
    tldr:
      - "AI tools may be freely used for learning (e.g., exam preparation, explanations)."
      - "The examination is conducted without AI support (e.g., written exam)."
      - "No labeling of AI use required."
    tldr_upload: "Course materials may be uploaded to AI tools."
    tldr_no_upload: "Course materials may **not** be uploaded to AI tools."
    document_title: "AI Policy: AI-Learn v1"
    document_intro: |
      This document establishes the guidelines for the use of AI tools in this course. The use of AI is generally permitted for learning purposes. The examination is conducted without AI support. Labeling of AI use is not required.
    items:
      - "grundsatz-erlaubt"
      - "kompetenzen-standard"
      - "erlaubt-ohne-kennzeichnung-regel"
      - id: "verboten-regel"
        text: |
          The following types of AI use are expressly **not** permitted in this course:

          - Use of AI tools for creating graded submissions and examination performances – the examination performance must be completed entirely independently.
          - Use of AI during supervised examinations (written exams, etc.), unless explicitly permitted by the examination regulations or the instructor – this may be treated as an attempt at deception.
          - Use of AI to circumvent learning objectives that explicitly require independent critical thinking, creative problem-solving, analytical skills, or specific methodological competencies.
          - Uploading copyrighted course materials or personal data to cloud-based AI systems without explicit permission (see Section 3).
      - "datenschutz-regel"
      - id: "pruefung-massnahmen"
        text: |
          AI tools may be used freely for learning during the semester. However, the examination is conducted without AI support to ensure a valid assessment of your individual competencies:

          - The examination takes the form of a **supervised written exam** where AI tools and internet access are not permitted.
          - The exam focuses on understanding and transfer, not mere knowledge reproduction.
      - "halluzinationen-warnung"
      - "lehrende-nutzen-ki"
      - "daten-keine-cloud"
      - "bewertung-keine-ki"
      - "unterstuetzung-angebot"
    upload_item: *upload_item_permission
    no_upload_item: "urheberrecht-verbot"

